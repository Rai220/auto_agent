# Auto Agent CLI — CI Pipeline
# First external verification: prove the project actually works
# in a clean environment that is NOT the author's machine.

name: CI

on:
  push:
    branches: [main, master]
    paths:
      - 'v8/auto_agent_cli/**'
      - 'v8/.github/workflows/ci.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'v8/auto_agent_cli/**'
      - 'v8/.github/workflows/ci.yml'
  workflow_dispatch:  # manual trigger

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ['3.10', '3.11', '3.12']
      fail-fast: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        working-directory: v8/auto_agent_cli
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Syntax check (all source files)
        working-directory: v8/auto_agent_cli
        run: |
          python -m py_compile src/auto_agent/__init__.py
          python -m py_compile src/auto_agent/cli.py
          python -m py_compile src/auto_agent/commands/init.py
          python -m py_compile src/auto_agent/commands/run.py
          python -m py_compile src/auto_agent/commands/think.py
          python -m py_compile src/auto_agent/commands/status.py
          python -m py_compile src/auto_agent/commands/learn.py
          python -m py_compile src/auto_agent/commands/archive.py
          python -m py_compile src/auto_agent/commands/utils.py
          python -m py_compile src/auto_agent/commands/__init__.py

      - name: Run pytest
        working-directory: v8/auto_agent_cli
        run: |
          python -m pytest tests/ -v --tb=short

      - name: CLI smoke test
        working-directory: v8/auto_agent_cli
        run: |
          # Version and help
          auto-agent --version
          auto-agent --help

          # Init a test agent
          TMPDIR=$(mktemp -d)
          auto-agent init "$TMPDIR/ci_agent" --name "CI-Bot" --goal "Verify CI works"

          # Check all expected files exist
          for f in MEMORY.md TODO.md GOALS.md JOURNAL.md KNOWLEDGE.md WHO_AM_I.md \
                   AGENTS.md MAIN_GOAL.md INBOX.md FAILURES.md \
                   run.sh loop.sh think.sh health_check.sh; do
            test -f "$TMPDIR/ci_agent/$f" || { echo "MISSING: $f"; exit 1; }
          done
          echo "All 14 files created ✓"

          # Check template substitution
          grep -q "CI-Bot" "$TMPDIR/ci_agent/MEMORY.md" || { echo "Name not substituted"; exit 1; }
          grep -q "Verify CI works" "$TMPDIR/ci_agent/GOALS.md" || { echo "Goal not substituted"; exit 1; }
          echo "Template substitution ✓"

          # Status
          auto-agent status -d "$TMPDIR/ci_agent"
          auto-agent status -d "$TMPDIR/ci_agent" --verbose > /dev/null
          echo "Status ✓"

          # Run and Think (dry-run — no claude CLI needed)
          auto-agent run -d "$TMPDIR/ci_agent" --dry-run > /dev/null 2>&1 || true
          auto-agent think -d "$TMPDIR/ci_agent" --dry-run > /dev/null 2>&1 || true
          echo "Run/Think dry-run ✓"

          # Archive (dry-run)
          auto-agent archive -d "$TMPDIR/ci_agent" --dry-run > /dev/null 2>&1 || true
          echo "Archive dry-run ✓"

          # Cleanup
          rm -rf "$TMPDIR"
          echo "All CI smoke tests passed ✓"

      - name: End-to-end lifecycle test
        working-directory: v8/auto_agent_cli
        run: |
          chmod +x test_e2e.sh
          bash test_e2e.sh
